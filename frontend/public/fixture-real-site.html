<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GazeTrack Real-Site Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
      }

      header,
      section,
      footer {
        padding: 32px;
      }

      header {
        position: sticky;
        top: 0;
        display: flex;
        justify-content: space-between;
        background: #ffffff;
        border-bottom: 1px solid #d9e1ec;
      }

      nav {
        display: flex;
        gap: 18px;
      }

      .hero {
        min-height: 520px;
        background: #eef6f3;
      }

      .cta {
        margin-top: 24px;
        border: 0;
        border-radius: 6px;
        padding: 14px 18px;
        background: #172033;
        color: #ffffff;
      }

      .pricing {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        min-height: 420px;
      }

      .pricing article {
        border: 1px solid #d9e1ec;
        padding: 24px;
      }

      footer {
        min-height: 260px;
        background: #172033;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <header data-gazetrack-aoi="navigation">
      <strong>Northstar</strong>
      <nav>
        <a>Product</a>
        <a>Pricing</a>
        <a>Docs</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h1 data-gazetrack-aoi="hero_headline">Find the plan that keeps your launch moving</h1>
        <p>Compare starter and team packages, then start checkout for the team plan.</p>
        <button class="cta" data-gazetrack-aoi="primary_cta" type="button">Start team checkout</button>
      </section>
      <section class="pricing" data-gazetrack-aoi="pricing_preview">
        <article><h2>Starter</h2><p>$19</p></article>
        <article><h2>Team</h2><p>$49</p></article>
        <article><h2>Scale</h2><p>Custom</p></article>
      </section>
    </main>
    <footer data-gazetrack-aoi="footer">Footer links and trust copy</footer>
    <script>
      const params = new URLSearchParams(window.location.search)
      window.GazeTrackConfig = {
        apiBaseUrl: params.get('apiBaseUrl'),
        studyId: params.get('studyId'),
        captureToken: params.get('captureToken'),
      }
    </script>
    <script src="/gazetrack-capture.js" async></script>
  </body>
</html>
